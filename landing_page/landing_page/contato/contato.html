<h1 class="destaque">Contato</h1>
<h2 class="formulario-titulo">Formulário</h2>

<table class="formulario-css">
    <tr>
        <th>Nome completo</th>
        <td><input type="text" placeholder="Digite o seu nome"></td>
    </tr>

    <tr>
        <th>Telefone</th>
        <td><input type="text" placeholder="Digite o seu número"></td>
    </tr>

    <tr>
        <th>E-mail</th>
        <td><input type="email" placeholder="Digite o seu e-mail"></td>
    </tr>

    <tr>
        <th>PF ou PJ</th>
        <td>
            <label><input type="checkbox"> Pessoa Física</label>
            <label><input type="checkbox"> Pessoa Jurídica</label>
        </td>
    </tr>

    <tr>
        <th>Melhor Horário</th>
        <td><input type="time"></td>
    </tr>

    <tr>
        <th>Tipo de Serviço</th>
        <td>
            <select>
                <option>Selecione</option>
            </select>
        </td>
    </tr>

    <tr>
        <th>Descrição do Projeto</th>
        <td><textarea rows="4"></textarea></td>
    </tr>
</table>

</body>
