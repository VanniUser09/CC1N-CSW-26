<h2>Formulário</h2>
<table border="3">
    <tr>
        <th>Nome completo</th>
        <td><input type="text" name="digit" id="" size="40" maxlength="30" value=""
            placeholder="Digite o seu nome" required></td>
    </tr>
    <tr>
        <th>Telefone</th>
        <td><input type="text" name="digit" id="" size="40" maxlength="30" value=""

    </tr>
    <tr>
        <th>E-mail</th>
                <td><input type="text" name="digit" id="" size="40" maxlength="30" value=""
            placeholder="Digite o seu e-mail" required></td>

        <th>PF ou PJ</th>

        <td><input type="time" name="" id=""></td>
    </tr>
    <tr>
        <th>Tipo de Serviço</th>
        <td><select name="tipo_servico" id="" size="1">

            <option value="sitecompleto">Site Completo</option>

    </tr>
